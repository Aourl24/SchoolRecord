{% extends 'base.html' %}
{% block content %}

<div class="max-w-4xl mx-auto py-6">
  <h1 class="text-headline-lg-mobile lg:text-display-lg font-display-lg text-on-surface mb-2">
    Report Cards
  </h1>
  <p class="text-body-md text-on-surface-variant mb-8">
    Select a class to view student report cards
  </p>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    {% for cls in all_classes %}
    <a href="{% url 'report-card' %}?class_id={{ cls.id }}&term={{ request.user.active_term|default:'First Term' }}&session={{ cls.session }}"
       class="bg-surface-container-lowest border border-outline-variant rounded-2xl p-6 scholar-shadow hover:scholar-shadow-hover transition flex flex-col items-center text-center group">
      <div class="w-16 h-16 rounded-2xl bg-primary-fixed flex items-center justify-center text-on-primary-fixed text-2xl mb-3 group-hover:scale-110 transition">
        <i class="fas fa-school"></i>
      </div>
      <h3 class="text-title-md font-bold text-on-surface">{{ cls.name }} {{ cls.batch }}</h3>
      <p class="text-label-sm text-on-surface-variant">{{ cls.student.count }} students</p>
      <span class="mt-3 text-primary text-sm font-semibold flex items-center gap-1">
        View Report Cards <i class="fas fa-arrow-right"></i>
      </span>
    </a>
    {% empty %}
    <div class="col-span-full text-center py-12 text-on-surface-variant">
      <i class="fas fa-inbox text-4xl text-outline block mb-3"></i>
      <p>You don't have any classes yet.</p>
    </div>
    {% endfor %}
  </div>
</div>

{% endblock %}
