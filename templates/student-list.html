<div class="divide-y divide-gray-100">
  {% for s in student %}
  <div class="flex items-center gap-3 py-3 min-h-[52px]">

    <!-- Counter -->
    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-xs text-gray-500 font-medium">
      {{ forloop.counter }}
    </div>

    <!-- Student Info -->
    <div class="flex-1 min-w-0 cursor-pointer"
         hx-get="{% url 'get-student-detail' s.id %}"
         hx-target="body" hx-swap="outerHTML" hx-push-url="true">
      <div class="text-sm font-semibold text-gray-900 truncate hover:text-primary transition">
        {{ s.name }}
      </div>
      <div class="text-xs text-gray-400 truncate">
        {{ s.class_name }}
      </div>
    </div>

    <!-- Arrow -->
    <div class="text-gray-300 flex-shrink-0">
      <i class="fas fa-chevron-right text-xs"></i>
    </div>

  </div>
  {% empty %}
  <div class="text-center text-gray-400 py-8 text-sm">
    No students found.
  </div>
  {% endfor %}
</div>

<!-- HTMX Target Container (for details) -->
<div id="student-detail"></div>
