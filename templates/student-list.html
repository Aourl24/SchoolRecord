{% if student %}

<div class="bg-surface-container-lowest border border-outline-variant rounded-2xl scholar-shadow overflow-hidden">

  <!-- List header -->
  <div class="px-5 py-3 bg-surface-container border-b border-outline-variant flex items-center justify-between">
    <span class="text-label-sm font-bold text-on-surface-variant uppercase tracking-wide">
      Name
    </span>
    <span class="text-label-sm font-bold text-on-surface-variant uppercase tracking-wide">
      Class
    </span>
  </div>

  <div class="divide-y divide-outline-variant">
    {% for s in student %}
    <div class="flex items-center gap-4 px-5 py-3.5 hover:bg-surface-container-low transition-colors cursor-pointer group"
         hx-get="{% url 'get-student-detail' s.id %}"
         hx-target="body" hx-swap="outerHTML" hx-push-url="true">

      <!-- Avatar with initials -->
      <div class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 font-bold text-sm text-on-primary
                  {% cycle 'bg-primary' 'bg-secondary' 'bg-tertiary' 'bg-primary' %}">
        {{ s.name|first|upper }}
      </div>

      <!-- Name + class -->
      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold text-on-surface truncate group-hover:text-primary transition-colors">
          {{ s.name }}
        </p>
        <p class="text-xs text-on-surface-variant truncate mt-0.5">
          {{ s.class_name }}
        </p>
      </div>

      <!-- Gender badge (if set) -->
      {% if s.gender %}
      <span class="hidden sm:inline-flex items-center text-xs font-medium px-2 py-0.5 rounded-full flex-shrink-0
        {% if s.gender == 'Male' %}bg-primary/10 text-primary{% else %}bg-tertiary/10 text-tertiary{% endif %}">
        {{ s.gender }}
      </span>
      {% endif %}

      <!-- Arrow -->
      <i class="fas fa-chevron-right text-xs text-outline group-hover:text-primary transition-colors flex-shrink-0"></i>

    </div>
    {% endfor %}
  </div>

</div>

{% else %}

<!-- Empty state -->
<div class="flex flex-col items-center justify-center bg-surface-container-lowest border-2 border-dashed border-outline-variant rounded-2xl py-16 px-6 text-center">
  <div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center mb-4">
    <i class="fas fa-user-slash text-on-surface-variant text-2xl"></i>
  </div>
  <h3 class="text-title-md font-bold text-on-surface mb-1">No students found</h3>
  <p class="text-sm text-on-surface-variant max-w-xs">
    No students have been added yet. Add students from a class page.
  </p>
</div>

{% endif %}

<!-- HTMX target for detail views -->
<div id="student-detail"></div>
