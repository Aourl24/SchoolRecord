<!-- Greeting Section -->
<div class="flex items-center justify-between mb-8">
  <div>
    <h5 class="font-bold text-lg text-gray-900 mb-0.5">Hello {{ request.user.username }}, 👋</h5>
    <p class="text-gray-400 text-sm">Let's be productive today!</p>
  </div>
</div>

<!-- Overview Section -->
<div class="mb-3">
  <h6 class="font-bold text-xs uppercase tracking-widest text-gray-400">Overview</h6>
</div>

<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-10">

  <!-- Student Card -->
  <div class="bg-yellow-50 border-0 rounded-2xl text-center p-4 cursor-pointer hover-lift transition"
       hx-get="{% url 'student-list' %}" hx-target="body" hx-swap="outerHTML" hx-push-url="true">
    <div class="w-12 h-12 rounded-full bg-yellow-200/60 flex items-center justify-center mx-auto mb-3">
      <i class="fas fa-user-graduate text-yellow-500 text-lg"></i>
    </div>
    <h6 class="font-semibold text-sm text-gray-700 mb-1">Student</h6>
    <h3 class="font-extrabold text-2xl text-gray-900">{{ students.count }}</h3>
  </div>

  <!-- Class Card -->
  <div class="bg-blue-50 border-0 rounded-2xl text-center p-4 cursor-pointer hover-lift transition"
       hx-get="{% url 'class-list' %}" hx-target="body" hx-swap="outerHTML" hx-push-url="true">
    <div class="w-12 h-12 rounded-full bg-blue-200/60 flex items-center justify-center mx-auto mb-3">
      <i class="fas fa-chalkboard-teacher text-blue-500 text-lg"></i>
    </div>
    <h6 class="font-semibold text-sm text-gray-700 mb-1">Class</h6>
    <h3 class="font-extrabold text-2xl text-gray-900">{{ classes.count }}</h3>
  </div>

  <!-- Subject Card -->
  <div class="bg-green-50 border-0 rounded-2xl text-center p-4 cursor-pointer hover-lift transition"
       hx-get="{% url 'subject-list' %}" hx-target="body" hx-swap="outerHTML" hx-push-url="true">
    <div class="w-12 h-12 rounded-full bg-green-200/60 flex items-center justify-center mx-auto mb-3">
      <i class="fas fa-book-open text-green-500 text-lg"></i>
    </div>
    <h6 class="font-semibold text-sm text-gray-700 mb-1">Subject</h6>
    <h3 class="font-extrabold text-2xl text-gray-900">{{ subjects.count }}</h3>
  </div>

  <!-- Record Card -->
  <div class="bg-red-50 border-0 rounded-2xl text-center p-4 cursor-pointer hover-lift transition"
       hx-get="{% url 'record-list' %}" hx-target="body" hx-swap="outerHTML" hx-push-url="true">
    <div class="w-12 h-12 rounded-full bg-red-200/60 flex items-center justify-center mx-auto mb-3">
      <i class="fas fa-file-alt text-red-400 text-lg"></i>
    </div>
    <h6 class="font-semibold text-sm text-gray-700 mb-1">Record</h6>
    <h3 class="font-extrabold text-2xl text-gray-900">{{ records.count }}</h3>
  </div>

</div>

<!-- Report Section -->
<div class="mb-3">
  <h6 class="font-bold text-xs uppercase tracking-widest text-gray-400">Report</h6>
</div>

<div class="mb-10">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 text-center p-6 cursor-pointer hover-lift transition"
       hx-get="{% url 'generateReport' %}" hx-target="body" hx-swap="outerHTML" hx-push-url="true">
    <i class="fas fa-chart-pie text-primary text-3xl mb-2 block"></i>
    <h6 class="font-semibold text-gray-700">Generate Report</h6>
  </div>
</div>

<!-- Recent Actions -->
<div class="mb-3">
  <h6 class="font-bold text-xs uppercase tracking-widest text-gray-400">Recent Actions</h6>
</div>

<div hx-get="{% url 'historyView' %}" hx-swap="innerHTML" hx-trigger="load"
     class="bg-gray-50 rounded-2xl p-4 shadow-sm min-h-[60px]">
</div>
