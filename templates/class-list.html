<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-gutter-desktop">
    {% for cls in school_class %}
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4 scholar-shadow flex items-center gap-4 active-tap cursor-pointer hover:border-primary/30 transition-all"
         hx-get="{% url 'get-class' cls.id %}" hx-target="body" hx-swap="outerHTML" hx-push-url="true">
      <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center text-primary flex-shrink-0">
        <span class="font-bold text-sm">{{ cls.name }}</span>
      </div>
      <div class="min-w-0 flex-1">
        <p class="font-body-md text-body-md font-semibold text-on-surface truncate">{{ cls.name }} {{ cls.batch }}</p>
        <p class="text-label-sm text-on-surface-variant">{{ cls.student.count }} students · {{ cls.session }}</p>
      </div>
      <i class="fas fa-chevron-right text-outline text-xs"></i>
    </div>
  {% empty %}
  <div class="col-span-full flex flex-col items-center justify-center bg-surface border-2 border-dashed border-outline-variant rounded-xl p-10 text-center">
    <div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant mb-4">
      <i class="fas fa-circle-plus text-2xl"></i>
    </div>
    <h3 class="text-title-md font-bold text-on-surface">No classes yet</h3>
    <p class="text-body-md text-on-surface-variant mt-2">Create your first class to get started.</p>
  </div>
  {% endfor %}
</div>
