<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
  {% for c in school_class %}
  <div class="bg-green-50 rounded-2xl p-4 shadow-sm hover:shadow-md transition">

    <!-- Class Name -->
    <h5 class="text-lg font-bold text-gray-900 mb-2">
      {{ c.name }} {{ c.batch }}
    </h5>

    <!-- Stats -->
    <p class="text-sm text-gray-500 mb-1">
      <span class="font-semibold text-gray-700">Students:</span> {{ c.student.all.count }}
    </p>

    {% if c.record.subject %}
    <p class="text-sm text-gray-500 mb-1">
      <span class="font-semibold text-gray-700">Subject:</span> {{ c.record.subject }}
    </p>
    {% endif %}

    <p class="text-sm text-gray-500 mb-4">
      <span class="font-semibold text-gray-700">Records:</span> {{ c.record.all.count }}
    </p>

    <!-- CTA -->
    <a hx-get="{% url 'get-class' c.id %}"
       hx-target="body" hx-swap="outerHTML" hx-push-url="true"
       class="block text-center w-full py-2 rounded-xl text-white text-sm font-semibold color-bg-p cursor-pointer shadow-sm hover:opacity-90 transition">
      Go to Class
    </a>

  </div>
  {% endfor %}
</div>
