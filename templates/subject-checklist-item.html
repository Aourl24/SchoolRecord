{% if subject %}
<label class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-surface-container-low transition border-b border-outline-variant last:border-b-0">
  <input type="checkbox" name="subjects" value="{{ subject.id }}" checked
         class="w-4 h-4 accent-primary cursor-pointer" />
  <span class="text-sm text-on-surface">{{ subject.name }}</span>
</label>
{% endif %}
