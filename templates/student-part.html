<!-- student-part.html -->
<div x-data="{ search: '' }" class="p-4 md:p-5">
  <!-- Search & Filter Bar -->
  <div class="flex flex-col sm:flex-row sm:items-center gap-3 mb-4">
    <div class="relative flex-1">
      <i class="fas fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-outline"></i>
      <input type="text" x-model="search" placeholder="Search students..."
             class="w-full pl-9 pr-4 py-2 border border-outline-variant rounded-xl bg-surface-container-low focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/30 focus:border-transparent outline-none transition text-sm">
    </div>
    <form hx-get="{% url 'filter-students' %}"
          hx-swap="innerHTML"
          hx-target="#studentTable"
          class="flex flex-wrap items-center gap-2">
      <select name="sign" class="border border-outline-variant rounded-xl px-3 py-2 bg-surface-container-low text-sm focus:ring-2 focus:ring-primary/30 focus:border-transparent outline-none">
        <option value="">Score</option>
        <option value="=">=</option>
        <option value="&gt;">&gt;</option>
        <option value="&lt;">&lt;</option>
      </select>
      <select name="score" class="border border-outline-variant rounded-xl px-3 py-2 bg-surface-container-low text-sm focus:ring-2 focus:ring-primary/30 focus:border-transparent outline-none">
        <option value="">Value</option>
        {% with "012345678910" as dummy %}
          {% for i in dummy %}
            <option>{{ forloop.counter0 }}</option>
          {% endfor %}
        {% endwith %}
      </select>
      <select name="filter" class="border border-outline-variant rounded-xl px-3 py-2 bg-surface-container-low text-sm focus:ring-2 focus:ring-primary/30 focus:border-transparent outline-none">
        <option value="">Sort</option>
        <option value="alpha">Alphabetical</option>
        <option value="score">By Score</option>
      </select>
      <button class="bg-secondary text-on-secondary text-sm font-semibold px-5 py-2 rounded-xl shadow-sm hover:opacity-90 transition active:scale-95 border-0 cursor-pointer">
        Apply
      </button>
    </form>
  </div>

  <!-- Hidden fields -->
  {% for s in students %}
    <input type="hidden" name="students" value="{{ s.student.id }}" />
  {% endfor %}
  {% if record_list %}
    {% for r in record_list %}
      <input type="hidden" name="record-list" value="{{ r }}" />
    {% endfor %}
  {% endif %}
  <input type="hidden" name="edit" value="{{ edit }}" />
  <input type="hidden" name="record" value="{{ record.id }}" />

  <!-- Student Table -->
  <div id="studentTable" x-data="{ search: search }">
    {% include 'students-table.html' %}
  </div>
</div>
