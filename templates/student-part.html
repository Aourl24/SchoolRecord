<div class="bg-white rounded-2xl shadow-sm p-4 my-3 text-sm">
  <form hx-get="{% url 'filter-students' %}"
        hx-swap="innerHTML"
        hx-target="#studentTable">

    <!-- Filter Row -->
    <div class="flex items-center gap-3 mb-3">
      <span class="font-semibold text-gray-700 w-12">Score</span>
      <select name="sign"
              class="flex-1 border border-gray-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30">
        <option value="">...</option>
        <option>=</option>
        <option>></option>
        <option><</option>
      </select>
      <select name="score"
              class="flex-1 border border-gray-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30">
        <option value="">...</option>
        {% with "1234567890203766"|slice:":10" as dummy_str %}
          {% for i in dummy_str %}
            <option>{{ forloop.counter0 }}</option>
          {% endfor %}
        {% endwith %}
      </select>
    </div>

    <!-- Sort Row -->
    <div class="mb-3">
      <select name="filter"
              class="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30">
        <option>Sort</option>
        <option value="alpha">Arrange Alphabetically</option>
        <option value="score">Arrange by Score</option>
      </select>
    </div>

    <!-- Hidden Fields -->
    {% for s in students %}
      <input type="hidden" name="students" value="{{ s.student.id }}" />
    {% endfor %}
    {% if record_list %}
      {% for r in record_list %}
        <input type="hidden" name="record-list" value="{{ r }}" />
      {% endfor %}
    {% endif %}
    <input type="hidden" name="edit" value="{{ edit }}" />
    <input type="hidden" name="record" value="{{ record.id }}" />

    <!-- Apply Button -->
    <div class="flex justify-end mb-3">
      <button class="color-bg-s text-white text-xs font-semibold px-5 py-2 rounded-lg shadow-sm hover:opacity-90 transition border-0 cursor-pointer">
        Apply
      </button>
    </div>

    <!-- Student Table -->
    <div id="studentTable">
      {% include 'students-table.html' %}
    </div>

  </form>
</div>
