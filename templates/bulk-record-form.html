<div id="formBox"
     class="fixed inset-0 z-[100000] overflow-y-auto bg-on-surface/50 backdrop-blur-sm p-4"
     style="animation: fadeIn 0.3s ease-out;">

  <div class="w-full max-w-xl mx-auto mt-10 mb-10" style="animation: modalSlideIn 0.4s ease-out;">

    <div class="bg-surface-container-lowest border border-outline-variant rounded-2xl scholar-shadow overflow-hidden">

      <!-- Header -->
      <div class="bg-primary px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-4 min-w-0">
          <div class="w-12 h-12 bg-white/15 rounded-xl flex items-center justify-center text-on-primary text-xl flex-shrink-0">
            <i class="fas fa-layer-group"></i>
          </div>
          <div class="min-w-0">
            <h2 class="text-on-primary text-title-md font-headline-lg m-0">Bulk Add Records</h2>
            <p class="text-on-primary/80 text-xs mt-0.5 truncate">
              {{ subject_teacher.subject.name }} · {{ class_obj.name }} {{ class_obj.batch }} · {{ term }}
            </p>
          </div>
        </div>
        <button class="w-10 h-10 bg-white/15 hover:bg-white/25 rounded-xl flex items-center justify-center text-on-primary text-lg border-0 cursor-pointer transition hover:rotate-90 flex-shrink-0"
                style="transition: all 0.3s ease;"
                hx-target="#formBox"
                hx-swap="outerHTML"
                hx-get="{% url 'closeRequest' %}"
                aria-label="Close">
          <i class="fas fa-xmark"></i>
        </button>
      </div>

      <!-- Body -->
      <div class="p-6 sm:p-8">
        <div id="saved" class="mb-4"></div>

        <p class="text-on-surface-variant text-xs mb-4 flex items-center gap-1.5 opacity-80">
          <i class="fas fa-circle-info"></i>
          Record numbers are assigned automatically (Test 1, Test 2, ...) — just pick a type and total marks for each row.
        </p>

        <form hx-post="{% url 'bulk-record-create' subject_teacher.id %}"
              hx-target="#saved"
              hx-swap="innerHTML">
          {% csrf_token %}

          <div id="record-rows" class="flex flex-col gap-2.5 mb-4">

            <!-- Starter row: Test -->
            <div class="record-row flex items-center gap-2.5">
              <select name="record_type"
                      class="flex-1 border border-outline-variant rounded-lg px-3 py-2.5 text-sm bg-surface-container-low outline-none focus:border-primary focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 transition-all">
                {% for rt in record_type_choices %}
                <option value="{{ rt }}" {% if rt == "Test" %}selected{% endif %}>{{ rt }}</option>
                {% endfor %}
              </select>
              <input type="number" name="total_score" value="30" min="1" placeholder="Marks"
                     class="w-24 border border-outline-variant rounded-lg px-3 py-2.5 text-sm text-center bg-surface-container-low outline-none focus:border-primary focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 transition-all" />
              <button type="button" onclick="removeRecordRow(this)"
                      class="w-9 h-9 flex-shrink-0 flex items-center justify-center rounded-lg text-error hover:bg-error-container/30 transition border-0 cursor-pointer bg-transparent">
                <i class="fas fa-trash-can text-sm"></i>
              </button>
            </div>

            <!-- Starter row: Exam -->
            <div class="record-row flex items-center gap-2.5">
              <select name="record_type"
                      class="flex-1 border border-outline-variant rounded-lg px-3 py-2.5 text-sm bg-surface-container-low outline-none focus:border-primary focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 transition-all">
                {% for rt in record_type_choices %}
                <option value="{{ rt }}" {% if rt == "Exam" %}selected{% endif %}>{{ rt }}</option>
                {% endfor %}
              </select>
              <input type="number" name="total_score" value="70" min="1" placeholder="Marks"
                     class="w-24 border border-outline-variant rounded-lg px-3 py-2.5 text-sm text-center bg-surface-container-low outline-none focus:border-primary focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 transition-all" />
              <button type="button" onclick="removeRecordRow(this)"
                      class="w-9 h-9 flex-shrink-0 flex items-center justify-center rounded-lg text-error hover:bg-error-container/30 transition border-0 cursor-pointer bg-transparent">
                <i class="fas fa-trash-can text-sm"></i>
              </button>
            </div>

          </div>

          <button type="button" onclick="addRecordRow()"
                  class="w-full flex items-center justify-center gap-2 text-primary bg-primary/10 hover:bg-primary/15 font-semibold py-2.5 rounded-xl border-0 cursor-pointer transition text-sm mb-6">
            <i class="fas fa-plus"></i> Add Row
          </button>

          <div class="flex gap-3 flex-col sm:flex-row">
            <button type="submit"
                    class="flex-1 flex items-center justify-center gap-2 bg-primary text-on-primary font-bold py-3.5 rounded-xl border-0 cursor-pointer hover:opacity-90 active:scale-[0.98] transition shadow-md">
              <i class="fas fa-floppy-disk"></i> Create Records
            </button>
            <button type="button"
                    class="flex-1 flex items-center justify-center gap-2 bg-surface-container-low hover:bg-surface-container text-on-surface-variant font-bold py-3.5 rounded-xl border border-outline-variant cursor-pointer transition"
                    hx-target="#formBox"
                    hx-swap="outerHTML"
                    hx-get="{% url 'closeRequest' %}">
              <i class="fas fa-xmark"></i> Cancel
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<style>
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes modalSlideIn {
    from { opacity: 0; transform: translateY(-30px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>

<script>
  function addRecordRow() {
    const container = document.getElementById('record-rows');
    const firstRow = container.querySelector('.record-row');
    const newRow = firstRow.cloneNode(true);
    newRow.querySelector('select').selectedIndex = 0;
    newRow.querySelector('input[type=number]').value = '';
    container.appendChild(newRow);
  }

  function removeRecordRow(btn) {
    const container = document.getElementById('record-rows');
    if (container.querySelectorAll('.record-row').length > 1) {
      btn.closest('.record-row').remove();
    }
  }
</script>
