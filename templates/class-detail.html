{% extends 'base.html' %}
{% block content %}

<!-- Breadcrumb -->
<div class="hidden lg:flex items-center gap-2 text-on-surface-variant text-label-sm font-label-sm mb-6">
  <a class="hover:text-primary transition-colors cursor-pointer"
     hx-get="{% url 'class-list' %}" hx-target="body" hx-swap="outerHTML" hx-push-url="true">Classes</a>
  <i class="fas fa-chevron-right text-[10px]"></i>
  <span class="text-primary font-bold">{{ class_name.name }} {{ class_name.batch }}</span>
</div>

<div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter-desktop items-start">

  <!-- Hero Card -->
  <div class="lg:col-span-4 bg-surface-container-lowest p-8 rounded-3xl border border-outline-variant scholar-shadow flex flex-col items-center text-center relative overflow-hidden">
    <div class="absolute inset-0 opacity-5 pointer-events-none bg-gradient-to-br from-primary to-secondary"></div>

    <div class="w-28 h-28 lg:w-32 lg:h-32 rounded-full bg-gradient-to-tr from-tertiary to-secondary flex items-center justify-center mb-6 shadow-lg relative z-10">
      <i class="fas fa-people-group text-white text-4xl lg:text-5xl"></i>
    </div>

    <h3 class="text-headline-lg-mobile lg:text-display-lg font-display-lg text-on-surface mb-1 relative z-10">
      {{ class_name.name }} {{ class_name.batch }}
    </h3>
    <p class="text-title-md font-title-md text-on-surface-variant relative z-10">
      {{ class_name.student.count }} Students Enrolled
    </p>

  </div>

  <!-- Actions + Students/Records -->
  <div class="lg:col-span-8 flex flex-col gap-gutter-desktop">

    <!-- Action Tiles -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">

      <!-- Edit Class -->
      <div hx-get="{% url 'update-form' 'class' class_name.id %}"
           hx-target="#addHere"
           class="flex flex-col items-center justify-center gap-3 p-6 bg-surface-container-lowest border border-outline-variant rounded-2xl scholar-shadow scholar-shadow-hover transition-all cursor-pointer group">
        <div class="w-12 h-12 rounded-xl bg-primary-fixed flex items-center justify-center text-on-primary-fixed group-hover:scale-110 transition-transform">
          <i class="fas fa-pen"></i>
        </div>
        <span class="font-title-md text-on-surface text-sm font-semibold">Edit Class</span>
      </div>

      <!-- Add Students -->
      <div hx-get="{% url 'add-student' class_name.id %}"
           hx-target="#addHere" hx-swap="innerHTML"
           class="flex flex-col items-center justify-center gap-3 p-6 bg-surface-container-lowest border border-outline-variant rounded-2xl scholar-shadow scholar-shadow-hover transition-all cursor-pointer group">
        <div class="w-12 h-12 rounded-xl bg-secondary-fixed flex items-center justify-center text-on-secondary-fixed group-hover:scale-110 transition-transform">
          <i class="fas fa-user-graduate"></i>
        </div>
        <span class="font-title-md text-on-surface text-sm font-semibold">Add Students</span>
      </div>

      <!-- Add Record -->
      <div hx-get="{% url 'add-record' class_name.id %}"
           hx-target="#addHere"
           class="flex flex-col items-center justify-center gap-3 p-6 bg-surface-container-lowest border border-outline-variant rounded-2xl scholar-shadow scholar-shadow-hover transition-all cursor-pointer group">
        <div class="w-12 h-12 rounded-xl bg-tertiary-fixed flex items-center justify-center text-on-tertiary-fixed group-hover:scale-110 transition-transform">
          <i class="fas fa-file"></i>
        </div>
        <span class="font-title-md text-on-surface text-sm font-semibold">Add Record</span>
      </div>

    </div>

    <!-- View Toggle -->
    <div class="bg-surface-container-lowest rounded-2xl border border-outline-variant scholar-shadow overflow-hidden">
      <div class="flex border-b border-outline-variant">
        <button id="view_record"
                class="flex-1 py-4 text-body-md font-bold transition-colors text-on-surface-variant hover:bg-surface-container-low"
                onclick="swap('view_record')"
                hx-get="{% url 'get-class-record' class_name.id %}"
                hx-target="#mini-load-area" hx-swap="innerHTML">
          <i class="fas fa-chart-line mr-2"></i>View Records
        </button>
        <button id="view_student"
                class="flex-1 py-4 text-body-md font-bold transition-colors text-on-surface-variant hover:bg-surface-container-low"
                onclick="swap('view_student')"
                hx-get="{% url 'get-student' class_name.id %}"
                hx-target="#mini-load-area" hx-swap="innerHTML">
          <i class="fas fa-user-group mr-2"></i>View Students
        </button>
      </div>

      <!-- Dynamic Content Area -->
      <div id="mini-load-area" class="p-2"></div>
    </div>

  </div>
</div>

<script>
  function swap(a) {
    var rec = document.getElementById("view_record");
    var stu = document.getElementById("view_student");

    if (a === "view_record") {
      rec.classList.add("bg-primary-container", "text-on-primary-container");
      stu.classList.remove("bg-primary-container", "text-on-primary-container");
    } else if (a === "view_student") {
      stu.classList.add("bg-primary-container", "text-on-primary-container");
      rec.classList.remove("bg-primary-container", "text-on-primary-container");
    }
  }
</script>

{% endblock %}
