{% extends 'base.html' %}
{% block content %}

<div class="my-4">

  <!-- Class Icon -->
  <div class="text-center mb-4">
    <span class="color-bg-t inline-flex items-center justify-center w-20 h-20 rounded-full shadow-sm text-4xl">
      <i class="fas fa-chalkboard-teacher text-white"></i>
    </span>
  </div>

  <!-- Class Info -->
  <div class="text-center mb-6">
    <h4 class="text-2xl font-bold text-gray-900">
      {{ class_name.name }} {{ class_name.batch }}
    </h4>
    <p class="text-gray-400 text-sm">Number of students: {{ class_name.student.count }}</p>
  </div>

  <!-- Action Cards -->
  <div class="flex flex-wrap justify-center gap-3 mb-6 text-sm text-center">

    <!-- Edit Class -->
    <div hx-get="{% url 'update-form' 'class' class_name.id %}"
         hx-target="#addHere"
         class="flex flex-col items-center gap-1 bg-white border border-gray-200 rounded-xl px-5 py-4 cursor-pointer hover:shadow-md hover:-translate-y-0.5 transition">
      <i class="fas fa-pen text-primary text-xl mb-1"></i>
      <span class="font-semibold text-gray-700">Edit Class</span>
    </div>

    <!-- Add Students -->
    <div hx-get="{% url 'add-student' class_name.id %}"
         hx-target="#addHere" hx-swap="innerHTML"
         class="flex flex-col items-center gap-1 bg-green-50 rounded-xl px-5 py-4 cursor-pointer hover:shadow-md hover:-translate-y-0.5 transition">
      <i class="fas fa-user-graduate text-green-500 text-xl mb-1"></i>
      <span class="font-semibold text-gray-700">Add Students</span>
    </div>

    <!-- Add Record -->
    <div hx-get="{% url 'add-record' class_name.id %}"
         hx-target="#addHere"
         class="flex flex-col items-center gap-1 bg-yellow-50 rounded-xl px-5 py-4 cursor-pointer hover:shadow-md hover:-translate-y-0.5 transition">
      <i class="fas fa-file-alt text-yellow-500 text-xl mb-1"></i>
      <span class="font-semibold text-gray-700">Add Record</span>
    </div>

  </div>

  <!-- View Toggle Buttons -->
  <div class="flex justify-center gap-3 mb-4">
    <button id="view_record"
            class="flex-1 max-w-[160px] border border-gray-200 rounded-xl py-2 text-sm font-semibold transition"
            onclick="swap('view_record')"
            hx-get="{% url 'get-class-record' class_name.id %}"
            hx-target="#mini-load-area" hx-swap="innerHTML">
      View Records
    </button>
    <button id="view_student"
            class="flex-1 max-w-[160px] border border-gray-200 rounded-xl py-2 text-sm font-semibold transition"
            onclick="swap('view_student')"
            hx-get="{% url 'get-student' class_name.id %}"
            hx-target="#mini-load-area" hx-swap="innerHTML">
      View Students
    </button>
  </div>

  <!-- Dynamic Content Area -->
  <div id="mini-load-area" class="mt-2"></div>

</div>

<script>
  function swap(a) {
    var rec = document.getElementById("view_record");
    var stu = document.getElementById("view_student");

    if (a === "view_record") {
      rec.classList.add("color-bg-p", "text-white", "border-transparent");
      stu.classList.remove("color-bg-p", "text-white", "border-transparent");
    } else if (a === "view_student") {
      stu.classList.add("color-bg-p", "text-white", "border-transparent");
      rec.classList.remove("color-bg-p", "text-white", "border-transparent");
    }
  }
</script>

{% endblock %}
