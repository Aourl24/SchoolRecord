{% extends 'base.html' %}

{% block content %}

{% if classes %}
<div class="flex flex-wrap gap-2 mb-6">
  <span class="text-label-sm text-on-surface-variant self-center mr-1">Filter:</span>

  <a class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-primary text-on-primary border border-primary rounded-full text-label-sm font-bold cursor-pointer"
     hx-get="{% url 'student-list' %}"
     hx-target="body" hx-swap="outerHTML" hx-push-url="true">
    All
  </a>

  {% for class in classes %}
  <a class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-surface-container-lowest border border-outline-variant rounded-full text-label-sm font-semibold text-on-surface-variant hover:border-primary hover:text-primary hover:bg-primary/5 transition-all cursor-pointer"
     hx-get="{% url 'get-student' class.id %}"
     hx-target="#student-list-area"
     hx-swap="innerHTML">
    <i class="fas fa-school text-[10px]"></i>
    {{ class.name }} {{ class.batch }}
  </a>
  {% endfor %}
</div>
{% endif %}

<!-- Student list area (HTMX target for filtering) -->
<div id="student-list-area">
  {% include "student-list.html" %}
</div>
{% endblock %}
