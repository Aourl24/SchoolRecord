{% extends 'base.html' %}

{% block content %}
<div class="flex justify-center py-4">
  <div class="w-full max-w-md">

    <div class="text-xl font-bold text-primary mb-4">Get Report</div>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-4 py-3 mb-4">
      {{ form.errors }} {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{% url 'generateReport' %}" class="space-y-4">
      {% csrf_token %}

      <!-- Subject -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Choose Subject</label>
        <select name="subject"
                class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-primary/30 bg-gray-50 focus:bg-white transition">
          {% for sub in subjects %}
          <option value="{{ sub.id }}">{{ sub.name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Class -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Choose Class</label>
        <select name="class"
                class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-primary/30 bg-gray-50 focus:bg-white transition">
          {% for cl in classes %}
          <option value="{{ cl.name }}">{{ cl.name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Batch -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Choose Batch</label>
        <select name="batch"
                class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-primary/30 bg-gray-50 focus:bg-white transition">
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="All">All</option>
        </select>
      </div>

      <!-- Term -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Choose Term</label>
        <select name="term"
                class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-primary/30 bg-gray-50 focus:bg-white transition">
          <option value="First Term">First</option>
          <option value="Second Term">Second</option>
          <option value="Third Term">Third</option>
          <option value="All">All</option>
        </select>
      </div>

      <button type="submit"
              class="w-full color-bg-t text-white text-sm font-semibold py-3 rounded-xl border-0 cursor-pointer hover:opacity-90 transition">
        Generate Report
      </button>

    </form>
  </div>
</div>
{% endblock %}
