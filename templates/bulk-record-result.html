<div class="rounded-xl p-4 {% if errors %}bg-amber-50 border border-amber-200{% else %}bg-emerald-50 border border-emerald-200{% endif %}">
  <p class="text-sm font-semibold {% if errors %}text-amber-700{% else %}text-emerald-700{% endif %} mb-1 flex items-center gap-2">
    <i class="fas {% if errors %}fa-triangle-exclamation{% else %}fa-circle-check{% endif %}"></i>
    {% if created %}Created: {{ created|join:", " }}{% else %}No records created.{% endif %}
  </p>
  {% if errors %}
  <ul class="text-xs text-amber-700 list-disc list-inside space-y-0.5 mt-2">
    {% for e in errors %}
    <li>{{ e }}</li>
    {% endfor %}
  </ul>
  {% endif %}

  {% if created %}
  <button type="button"
          class="mt-3 text-xs font-semibold text-primary hover:underline bg-transparent border-0 cursor-pointer p-0"
          hx-get="{% url 'bulk-multi-score-entry' subject_teacher.id %}"
          hx-target="#formBox"
          hx-swap="outerHTML">
    <i class="fas fa-arrow-right mr-1"></i> Enter scores for these records now
  </button>
  {% endif %}
</div>
