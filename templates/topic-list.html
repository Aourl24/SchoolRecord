<div class="bg-white rounded-xl py-2">
  {% if topics %}
  <ol class="list-decimal list-inside divide-y divide-gray-100">
    {% for topic in topics %}
    <li class="py-2 px-2 text-sm text-gray-700 hover:bg-gray-50 rounded transition">
      <a href="{{ topic.get_absolute_url }}" class="no-underline text-gray-800 hover:text-primary transition">
        {{ topic }}
      </a>
    </li>
    {% endfor %}
  </ol>
  {% else %}
  <div class="text-center text-red-400 text-sm py-4">
    No Topic available
  </div>
  {% endif %}
</div>
