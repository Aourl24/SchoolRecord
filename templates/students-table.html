<div class="overflow-x-auto rounded-xl border border-outline-variant scholar-shadow">
  <table class="w-full border-collapse">
    <thead>
      <tr class="bg-primary text-on-primary">
        <th class="px-4 py-3 text-center font-label-sm text-label-sm uppercase tracking-wider border-r border-white/20 w-16">S/N</th>
        <th class="px-4 py-3 text-left font-label-sm text-label-sm uppercase tracking-wider border-r border-white/20">Student</th>
        <th class="px-4 py-3 text-center font-label-sm text-label-sm uppercase tracking-wider w-24">Score</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-outline-variant">
      {% for student in students %}
      <tr class="{% cycle 'bg-surface-container-lowest' 'bg-surface-container-low/30' %} hover:bg-surface-container-low transition-colors">
        <td class="px-4 py-3 text-center font-body-md text-outline border-r border-outline-variant/30">{{ forloop.counter }}</td>
        <td class="px-4 py-3 font-body-md border-r border-outline-variant/30">
          <span class="font-semibold text-on-surface cursor-pointer hover:text-primary transition-colors"
                hx-get="{% url 'get-student-detail' student.student.id %}"
                hx-target="#load-area"
                hx-swap="innerHTML">
            {{ student.student.name|title }}
          </span>
          {% if not edit %}
          <span class="font-label-sm text-label-sm text-outline ml-1">{{ student.student.class_name }}</span>
          {% endif %}
        </td>
        <td class="px-4 py-3 text-center">
          <span class="inline-flex items-center justify-center w-12 h-10 rounded-lg font-bold cursor-pointer transition-transform active:scale-95
                       {% if student.score >= half %}bg-secondary text-on-secondary{% else %}bg-error text-on-error{% endif %}"
                hx-get="{% url 'update-form' 'student-record' student.id %}"
                hx-target="#addHere"
                hx-trigger="click">
            {{ student.score }}
          </span>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
