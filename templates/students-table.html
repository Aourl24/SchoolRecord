<div class="overflow-x-auto rounded-xl border border-gray-100 shadow-sm">
  <table class="w-full text-sm">
    <thead>
      <tr class="color-bg-p text-white text-xs">
        <th class="px-3 py-2 text-center border-r border-white/20 w-10">S/N</th>
        <th class="px-3 py-2 text-left border-r border-white/20">Student</th>
        <th class="px-3 py-2 text-center w-20">Score</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
      {% for student in students %}
      <tr class="hover:bg-gray-50 transition">
        <td class="px-3 py-2 text-center text-gray-400 border-r border-gray-100">{{ forloop.counter }}</td>
        <td class="px-3 py-2 border-r border-gray-100">
          <span class="text-gray-800 cursor-pointer hover:text-primary transition"
                hx-get="{% url 'get-student-detail' student.student.id %}"
                hx-target="#load-area"
                hx-swap="innerHTML">
            {{ student.student.name|title }}
          </span>
          {% if not edit %}
          <span class="text-gray-400 text-xs ml-1">{{ student.student.class_name }}</span>
          {% endif %}
        </td>
        <td class="px-3 py-2 text-center font-bold text-white
                   {% if student.score >= half %}bg-emerald-500{% elif student.score < half %}bg-red-400{% endif %}">
          <span class="cursor-pointer"
                hx-get="{% url 'update-form' 'student-record' student.id %}"
                hx-target="#addHere"
                hx-trigger="click">
            {{ student.score }}
          </span>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
