{% extends 'base.html' %}

{% block content %}
<h2 class="py-4 text-2xl font-bold text-primary">All Subjects</h2>

<ul class="divide-y divide-gray-100">
  {% for subject in subjects %}
  <li>
    <a href="{{ subject.get_absolute_url }}"
       class="block py-3 text-base text-gray-800 no-underline hover:text-primary transition font-medium">
      {{ subject.name }}
    </a>
  </li>
  {% endfor %}
</ul>
{% endblock %}
